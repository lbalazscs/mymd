<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown Viewer</title>

    <!-- Marked.js for markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked@18.0.5/lib/marked.umd.min.js" defer></script>

    <!-- Highlight.js for syntax highlighting -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/styles/atom-one-dark.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11.11.1/highlight.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/lib/languages/markdown.min.js" defer></script>
    
    <!-- KaTeX for LaTeX math rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.17.0/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.17.0/dist/katex.min.js" defer></script>
    
    <!-- Toastify JS for notifications -->
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js@1.12.0/src/toastify.min.css">
    <script src="https://cdn.jsdelivr.net/npm/toastify-js@1.12.0/src/toastify.min.js" defer></script>
    
    <!-- DOMPurify for HTML sanitization -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.4.11/dist/purify.min.js" defer></script>

    <link rel="stylesheet" type="text/css" href="mymd.css">
</head>
<body>
    <div class="app-container">
        <div class="tabs-container">
            <div class="tab-list" id="tab-list">
                <button id="new-tab-btn" title="New Tab">+</button>
            </div>
            <div class="view-controls">
                <div class="dropdown">
                    <button class="dropdown-btn" title="Menu">&#8942;</button>
                    <div class="dropdown-content">
                        <a href="#" id="menu-toggle-source">
                            <span id="menu-toggle-source-text">Show Source</span>
                            <span class="hotkey">S</span>
                        </a>
                        <a href="#" id="menu-close-others">
                            <span>Close Others</span>
                            <span class="hotkey">Ctrl+Shift+O</span>
                        </a>
                        <a href="#" id="menu-close-all">
                            <span>Close All</span>
                        </a>
                    </div>
                </div>
            </div>
        </div>
        <div class="content-container">
        </div>
    </div>

    <script src="mymd.js"></script>
</body>
</html>
