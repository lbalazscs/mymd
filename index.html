<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown Viewer</title>

    <!-- Marked.js for markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked@18.0.4/lib/marked.umd.min.js" defer></script>

    <!-- Highlight.js for syntax highlighting -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/styles/atom-one-dark.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11.11.1/highlight.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/lib/languages/markdown.min.js" defer></script>
    
    <!-- KaTeX for LaTeX math rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.47/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.47/dist/katex.min.js" defer></script>
    
    <!-- Toastify JS for notifications -->
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js@1.12.0/src/toastify.min.css">
    <script src="https://cdn.jsdelivr.net/npm/toastify-js@1.12.0/src/toastify.min.js" defer></script>

    <style>
        /* --- General & Dark Theme --- */
        :root {
            --bg-color: #1e1e1e;
            --primary-text-color: #d4d4d4;
            --secondary-text-color: #a0a0a0;
            --border-color: #333333;
            --tab-bg: #2d2d2d;
            --tab-active-bg: var(--bg-color);
            --tab-hover-bg: #3e3e3e;
            --button-bg: #3c3c3c;
            --button-hover-bg: #5a5a5a;
            --accent-color: #007acc;
            --code-bg: #252526;
        }

        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-text-color);
            font-size: 16px;
            line-height: 1.6;
        }

        /* --- App Layout --- */
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* --- Tabs --- */
        .tabs-container {
            display: flex;
            flex-shrink: 0;
            background-color: #252526;
            border-bottom: 1px solid var(--border-color);
            align-items: center;
            padding-left: 5px;
            padding-right: 15px; /* Space for the toggle */
        }

        .tab-list {
            display: flex;
            align-items: center;
            flex-grow: 1;
            overflow-x: auto;
        }

        .tab {
            display: flex;
            align-items: center;
            padding: 10px 15px;
            cursor: pointer;
            border-right: 1px solid var(--border-color);
            background-color: var(--tab-bg);
            color: var(--secondary-text-color);
            user-select: none;
            transition: background-color 0.2s ease;
            white-space: nowrap;
        }

        .tab:hover {
            background-color: var(--tab-hover-bg);
            color: var(--primary-text-color);
        }

        .tab.active {
            background-color: var(--tab-active-bg);
            color: var(--primary-text-color);
            border-bottom-color: transparent;
        }
        
        .tab.dragging {
            opacity: 0.5;
            background-color: var(--tab-hover-bg);
        }

        .close-tab {
            margin-left: 10px;
            width: 20px;
            height: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
            border: none;
            background: none;
            color: var(--secondary-text-color);
            cursor: pointer;
            font-weight: bold;
            border-radius: 50%;
            line-height: 1;
        }

        .close-tab:hover {
            color: white;
            background-color: #c00;
        }

        #new-tab-btn {
            padding: 5px 12px;
            margin-left: 5px;
            font-size: 20px;
            font-weight: bold;
            border: none;
            background-color: transparent;
            color: var(--secondary-text-color);
            cursor: pointer;
            border-radius: 4px;
            flex-shrink: 0;
        }

        #new-tab-btn:hover {
            background-color: var(--button-hover-bg);
            color: white;
        }

        /* --- Dropdown Menu --- */
        .view-controls {
            margin-left: auto; /* Push to right */
            display: flex;
            align-items: center;
        }

        .dropdown {
            position: relative;
            display: inline-block;
        }

        .dropdown-btn {
            background: none;
            border: none;
            color: var(--secondary-text-color);
            font-size: 24px;
            cursor: pointer;
            padding: 0 10px;
            line-height: 1;
            font-weight: bold;
            user-select: none;
        }

        .dropdown-btn:hover {
            color: var(--primary-text-color);
        }

        .dropdown-content {
            display: none;
            position: absolute;
            right: 0;
            top: 100%;
            background-color: var(--tab-bg);
            min-width: 200px;
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.5);
            z-index: 2000;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            margin-top: 5px;
        }

        .dropdown-content.show {
            display: block;
        }

        .dropdown-content a {
            color: var(--primary-text-color);
            padding: 10px 16px;
            text-decoration: none;
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            align-items: center;
        }

        .dropdown-content a:hover {
            background-color: var(--tab-hover-bg);
        }

        .hotkey {
            color: var(--secondary-text-color);
            font-size: 0.85em;
            margin-left: 15px;
        }

        /* --- Content Area --- */
        .content-container {
            flex-grow: 1;
            position: relative;
        }

        .content-pane {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            padding: 20px 40px;
            overflow-y: auto;
            display: none;
        }

        .content-pane.active {
            display: block;
        }
        
        .placeholder {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 80%;
            color: var(--secondary-text-color);
            font-size: 1.5em;
            text-align: center;
            line-height: 1.5;
        }

        /* --- View Modes (Preview vs Source) --- */
        .source-view {
            display: none;
        }
        
        .preview-view {
            display: block;
        }

        /* When app is in source mode, flip visibility */
        .app-container.show-source .source-view {
            display: block;
        }
        .app-container.show-source .preview-view {
            display: none;
        }

        /* --- Rendered Markdown Styles --- */
        .preview-view h1, .preview-view h2, .preview-view h3 {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.3em;
            margin-top: 24px;
            margin-bottom: 16px;
        }

        .preview-view h1 { font-size: 2em; }
        .preview-view h2 { font-size: 1.5em; }
        .preview-view h3 { font-size: 1.2em; }

        .preview-view a {
            color: var(--accent-color);
            text-decoration: none;
        }
        .preview-view a:hover {
            text-decoration: underline;
        }

        .preview-view blockquote {
            padding: 0 1em;
            color: var(--secondary-text-color);
            border-left: 0.25em solid var(--border-color);
            margin-left: 0;
        }

        .preview-view code {
            padding: .2em .4em;
            margin: 0;
            font-size: 85%;
            background-color: var(--code-bg);
            border-radius: 6px;
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        }

        .preview-view pre {
            padding: 16px;
            overflow: auto;
            font-size: 85%;
            line-height: 1.45;
            background-color: var(--code-bg);
            border-radius: 6px;
        }

        .preview-view pre code {
            padding: 0;
            margin: 0;
            background-color: transparent;
            border: none;
        }

        .preview-view table {
            border-collapse: collapse;
            margin: 1em 0;
        }

        .preview-view th, .preview-view td {
            border: 1px solid var(--border-color);
            padding: 6px 13px;
        }

        .preview-view tr {
            background-color: var(--bg-color);
            border-top: 1px solid var(--border-color);
        }

        .preview-view tr:nth-child(2n) {
            background-color: #252526;
        }

        /* --- Source View Styling --- */
        .source-view pre {
            margin: 0;
            padding: 0;
            background: transparent;
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
            font-size: 14px;
            tab-size: 4;
        }
        
        .source-view pre code {
            background: transparent;
            padding: 0;
            white-space: pre-wrap; /* Wrap long lines in source view */
            word-break: break-all;
        }

        /* --- KaTeX Math Styling (Dark Theme) --- */
        .katex {
            color: var(--primary-text-color);
        }
        
        .katex-display {
            margin: 1em 0;
        }

        /* --- Code Block Copy Button --- */
        .code-block-wrapper {
            position: relative;
            margin: 1em 0;
        }

        .copy-code-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            padding: 4px;
            background-color: #4a4a4a;
            color: #eee;
            border: 1px solid #666;
            border-radius: 4px;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s ease-in-out, background-color 0.2s;
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .code-block-wrapper:hover .copy-code-btn {
            opacity: 1;
        }

        .copy-code-btn:hover {
            background-color: #6a6a6a;
        }

        .copy-code-btn:active {
            background-color: #3a3a3a;
        }

        /* --- Tab Renaming Input --- */
        .tab .tab-name-input {
            border: 1px solid var(--accent-color);
            outline: none;
            border-radius: 3px;
            font-family: inherit;
            font-size: inherit;
            line-height: inherit;
            background-color: var(--bg-color);
            color: var(--primary-text-color);
            padding: 0 4px;
        }

        /* --- Drag and Drop Overlay --- */
        .app-container.is-dragging::before {
            content: 'Drop .md file here';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(45, 45, 45, 0.85);
            border: 3px dashed var(--accent-color);
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2em;
            color: var(--primary-text-color);
            z-index: 1000;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="tabs-container">
            <div class="tab-list" id="tab-list">
                <button id="new-tab-btn" title="New Tab">+</button>
            </div>
            <div class="view-controls">
                <div class="dropdown">
                    <button class="dropdown-btn" title="Menu">&#8942;</button>
                    <div class="dropdown-content">
                        <a href="#" id="menu-toggle-source">
                            <span id="menu-toggle-source-text">Show Source</span>
                            <span class="hotkey">S</span>
                        </a>
                        <a href="#" id="menu-close-others">
                            <span>Close Others</span>
                            <span class="hotkey">Ctrl+Shift+O</span>
                        </a>
                        <a href="#" id="menu-close-all">
                            <span>Close All</span>
                        </a>
                    </div>
                </div>
            </div>
        </div>
        <div class="content-container">
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const appContainer = document.querySelector('.app-container'); 
            const tabList = document.getElementById('tab-list');
            const contentContainer = document.querySelector('.content-container');
            const newTabBtn = document.getElementById('new-tab-btn');
            
            // Dropdown Menu Elements
            const dropdownBtn = document.querySelector('.dropdown-btn');
            const dropdownContent = document.querySelector('.dropdown-content');
            const menuToggleSource = document.getElementById('menu-toggle-source');
            const menuToggleSourceText = document.getElementById('menu-toggle-source-text');
            const menuCloseOthers = document.getElementById('menu-close-others');
            const menuCloseAll = document.getElementById('menu-close-all');

            let tabCounter = 0;

            const copyIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>`;
            const checkIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#28a745" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
            
            tabList.addEventListener('dragover', (e) => {
                const draggingTab = document.querySelector('.tab.dragging');
                if (!draggingTab) return; // If dragging a file instead of a tab, ignore this and let the file drop handler take over

                e.preventDefault(); // Allow the drop
                
                // Find all tabs except the one currently being dragged
                const draggableElements = [...tabList.querySelectorAll('.tab:not(.dragging)')];
                
                // Determine which element the cursor is hovering over
                const afterElement = draggableElements.reduce((closest, child) => {
                    const box = child.getBoundingClientRect();
                    const offset = e.clientX - box.left - box.width / 2;
                    if (offset < 0 && offset > closest.offset) {
                        return { offset: offset, element: child };
                    } else {
                        return closest;
                    }
                }, { offset: Number.NEGATIVE_INFINITY }).element;

                // Live-update the DOM position
                if (afterElement == null) {
                    tabList.insertBefore(draggingTab, newTabBtn);
                } else {
                    tabList.insertBefore(draggingTab, afterElement);
                }
            });

            // Helper for universal toast notifications
            function showToast(message, isError = true) {
                if (typeof Toastify === 'undefined') {
                    alert(message); // Fallback just in case script hasn't loaded
                    return;
                }
                Toastify({
                    text: message,
                    duration: 3000,
                    gravity: "bottom", 
                    position: "right", 
                    style: {
                        background: isError ? "#c00" : "#28a745",
                        color: "#fff",
                        borderRadius: "4px"
                    }
                }).showToast();
            }

            // --- Dropdown Logic ---
            dropdownBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                dropdownContent.classList.toggle('show');
            });

            window.addEventListener('click', () => {
                if (dropdownContent.classList.contains('show')) {
                    dropdownContent.classList.remove('show');
                }
            });

            function setSourceMode(showSource) {
                if (showSource) {
                    appContainer.classList.add('show-source');
                    menuToggleSourceText.textContent = 'Show Formatted';
                } else {
                    appContainer.classList.remove('show-source');
                    menuToggleSourceText.textContent = 'Show Source';
                }
            }

            menuToggleSource.addEventListener('click', (e) => {
                e.preventDefault();
                toggleSource();
            });
            
            function toggleSource() {
                const isSource = appContainer.classList.contains('show-source');
                setSourceMode(!isSource);
            }

            function closeOtherTabs() {
                const activeTab = document.querySelector('.tab.active');
                if (!activeTab) return;
                
                document.querySelectorAll('.tab').forEach(tab => {
                    if (tab !== activeTab) {
                        closeTab(tab, true);
                    }
                });
            }

            function closeAllTabs() {
                document.querySelectorAll('.tab').forEach(t => closeTab(t, true));
                createNewTab();
            }

            menuCloseOthers.addEventListener('click', (e) => {
                e.preventDefault();
                closeOtherTabs();
            });

            menuCloseAll.addEventListener('click', (e) => {
                e.preventDefault();
                closeAllTabs();
            });

            // Hotkeys
            document.addEventListener('keydown', (e) => {
                // Prevent hotkeys from triggering when the user is typing inside an input field
                if (e.target.tagName === 'INPUT') return;

                // S to toggle source
                if (e.key.toLowerCase() === 's') {
                    e.preventDefault();
                    toggleSource();
                }

                // Ctrl+Shift+O for Close Others
                if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === 'o') {
                    e.preventDefault();
                    closeOtherTabs();
                }
            });

            // --- Markdown Rendering Logic ---
            const mathExtension = {
                name: 'math',
                level: 'inline',
                start(src) {
                    const dollarMatch = src.match(/\$+/);
                    return dollarMatch ? dollarMatch.index : -1;
                },
                tokenizer(src) {
                    const displayMatch = src.match(/^\$\$([^\$]+?)\$\$/);
                    if (displayMatch) {
                        return { type: 'math', raw: displayMatch[0], text: displayMatch[1].trim(), displayMode: true };
                    }
                    const inlineMatch = src.match(/^\$([^\$\n]+?)\$/);
                    if (inlineMatch) {
                        return { type: 'math', raw: inlineMatch[0], text: inlineMatch[1].trim(), displayMode: false };
                    }
                },
                renderer(token) {
                    try {
                        return katex.renderToString(token.text, {
                            displayMode: token.displayMode,
                            throwOnError: false,
                            output: 'html'
                        });
                    } catch (e) {
                        console.error('KaTeX rendering error:', e);
                        return `<span style="color: #ff6b6b;">${token.raw}</span>`;
                    }
                }
            };

            function initializeMarked() {
                if (typeof marked !== 'undefined') {
                    marked.use({ 
                        extensions: [mathExtension],
                        pedantic: false,
                        gfm: true,
                        breaks: false,
                        sanitize: false,
                        smartLists: true,
                        smartypants: false,
                        xhtml: false,
                        highlight: function (code, lang) {
                            const language = hljs.getLanguage(lang) ? lang : 'plaintext';
                            return hljs.highlight(code, { language, ignoreIllegals: true }).value;
                        }
                    });
                }
            }
            
            initializeMarked();

            function createNewTab() {
                tabCounter++;
                const tabId = `tab-${tabCounter}`;

                deactivateAllTabs();

                const tab = document.createElement('div');
                tab.className = 'tab active';
                tab.dataset.tabId = tabId;
                tab.innerHTML = `
                    <span>new ${tabCounter}</span>
                    <button class="close-tab" title="Close Tab">×</button>
                `;
                
                tab.setAttribute('draggable', 'true');

                tab.addEventListener('dragstart', (e) => {
                    // Prevent dragging if the user is clicking the close button or typing a new name
                    if (e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON') {
                        e.preventDefault();
                        return;
                    }
                    tab.classList.add('dragging');
                    e.dataTransfer.effectAllowed = 'move';
                    e.dataTransfer.setData('text/plain', tabId); // Required by Firefox to allow dragging
                });

                tab.addEventListener('dragend', () => {
                    tab.classList.remove('dragging');
                });
                
                tabList.insertBefore(tab, newTabBtn);

                const contentPane = document.createElement('div');
                contentPane.className = 'content-pane active';
                contentPane.id = tabId;
                contentPane.innerHTML = `
                    <div class="placeholder">
                        <p>Paste Markdown (Ctrl+V)<br>or drop a .md file anywhere.</p>
                    </div>
                `;
                contentContainer.appendChild(contentPane);

                tab.addEventListener('click', (e) => {
                    if (e.target.tagName !== 'BUTTON' && e.target.tagName !== 'INPUT') {
                        switchTab(tab);
                    }
                });

                tab.querySelector('.close-tab').addEventListener('click', (e) => {
                    e.stopPropagation();
                    closeTab(tab);
                });

                const tabLabel = tab.querySelector('span');
                tabLabel.addEventListener('dblclick', () => {
                    makeTabEditable(tabLabel);
                });
            }

            function switchTab(tabToActivate) {
                deactivateAllTabs();
                const tabId = tabToActivate.dataset.tabId;
                const contentPaneToActivate = document.getElementById(tabId);

                tabToActivate.classList.add('active');
                if (contentPaneToActivate) {
                    contentPaneToActivate.classList.add('active');
                }
            }

            function closeTab(tabToClose, bypassNewTabCheck = false) {
                const wasActive = tabToClose.classList.contains('active');
                const tabId = tabToClose.dataset.tabId;
                const contentPaneToClose = document.getElementById(tabId);
                
                const prevSibling = tabToClose.previousElementSibling;
                const nextSibling = tabToClose.nextElementSibling;

                tabToClose.remove();
                if (contentPaneToClose) {
                    contentPaneToClose.remove();
                }

                if (wasActive) {
                    if (prevSibling && prevSibling.classList.contains('tab')) {
                        switchTab(prevSibling);
                    } else if (nextSibling && nextSibling.classList.contains('tab')) {
                        switchTab(nextSibling);
                    }
                }
                
                if (!bypassNewTabCheck && tabList.querySelectorAll('.tab').length === 0) {
                    createNewTab();
                }
            }

            function deactivateAllTabs() {
                document.querySelectorAll('.tab.active').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.content-pane.active').forEach(p => p.classList.remove('active'));
            }

            function makeTabEditable(labelElement) {
                const originalText = labelElement.textContent;
                const tab = labelElement.parentElement;

                if (tab.querySelector('.tab-name-input')) {
                    return;
                }

                const input = document.createElement('input');
                input.type = 'text';
                input.value = originalText;
                input.className = 'tab-name-input';
                
                input.style.width = `${labelElement.offsetWidth}px`;

                tab.replaceChild(input, labelElement);
                input.focus();
                input.select();

                const finishEditing = (save = true) => {
                    input.removeEventListener('blur', onBlur);
                    input.removeEventListener('keydown', onKeydown);

                    const newText = input.value.trim();
                    const finalName = (save && newText) ? newText : originalText;

                    const newLabel = document.createElement('span');
                    newLabel.textContent = finalName;

                    if (input.parentElement) {
                        input.parentElement.replaceChild(newLabel, input);
                    }

                    newLabel.addEventListener('dblclick', () => makeTabEditable(newLabel));
                };

                const onBlur = () => finishEditing(true);
                const onKeydown = (e) => {
                    if (e.key === 'Enter') finishEditing(true);
                    else if (e.key === 'Escape') finishEditing(false);
                };

                input.addEventListener('blur', onBlur);
                input.addEventListener('keydown', onKeydown);
            }

            function addCopyButtons(container) {
                const codeBlocks = container.querySelectorAll('pre');
                codeBlocks.forEach(block => {
                    if (block.parentNode.classList.contains('code-block-wrapper')) return;
                    
                    const wrapper = document.createElement('div');
                    wrapper.className = 'code-block-wrapper';
                    const button = document.createElement('button');
                    button.className = 'copy-code-btn';
                    button.innerHTML = copyIcon;
                    button.title = 'Copy';
                    
                    block.parentNode.insertBefore(wrapper, block);
                    wrapper.appendChild(block);
                    wrapper.appendChild(button);
                    
                    button.addEventListener('click', () => {
                        const code = block.querySelector('code').innerText;
                        navigator.clipboard.writeText(code).then(() => {
                            button.innerHTML = checkIcon;
                            setTimeout(() => { button.innerHTML = copyIcon; }, 2000);
                        }).catch(err => {
                            console.error('Failed to copy text: ', err);
                            button.textContent = 'Error';
                        });
                    });
                });
            }

            function escapeHtml(text) {
                return text
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;")
                    .replace(/'/g, "&#039;");
            }

            function renderContent(markdown, filename = null) {
                if (!markdown) return;

                // Force exit Source mode on paste/drop
                setSourceMode(false);

                let activeContentPane = document.querySelector('.content-pane.active');
                let activeTab = document.querySelector('.tab.active');

                if (!activeContentPane) {
                    createNewTab();
                    activeContentPane = document.querySelector('.content-pane.active');
                    activeTab = document.querySelector('.tab.active');
                }

                const isCurrentTabEmpty = activeContentPane.querySelector('.placeholder');

                if (!isCurrentTabEmpty) { // the current tab already has content
                    createNewTab();
                    activeContentPane = document.querySelector('.content-pane.active');
                    activeTab = document.querySelector('.tab.active');
                }

                const renderedHtml = marked.parse(markdown);
                const sourceHtml = `<pre><code class="language-markdown">${escapeHtml(markdown)}</code></pre>`;

                activeContentPane.innerHTML = `
                    <div class="preview-view">${renderedHtml}</div>
                    <div class="source-view">${sourceHtml}</div>
                `;

                const previewView = activeContentPane.querySelector('.preview-view');
                const sourceView = activeContentPane.querySelector('.source-view');

                addCopyButtons(previewView);
                
                const codeBlocks = activeContentPane.querySelectorAll('pre code');
                codeBlocks.forEach(block => {
                    hljs.highlightElement(block);
                });
                
                if(sourceView) {
                    const sourceCodeBlock = sourceView.querySelector('code');
                    if(sourceCodeBlock) hljs.highlightElement(sourceCodeBlock);
                }

                // If a filename was provided, strips the .md extension and sets it as the tab label
                if (filename && activeTab) {
                    const tabLabel = activeTab.querySelector('span');
                    if (tabLabel) {
                        tabLabel.textContent = filename.replace(/\.md$/i, '');
                    }
                }
            }

            function handlePaste(event) {
                if (document.activeElement.classList.contains('tab-name-input')) return;

                event.preventDefault();
                const pastedText = (event.clipboardData || window.clipboardData).getData('text');
                renderContent(pastedText);
            }

            async function handleFileDrop(event) {
                event.preventDefault();
                appContainer.classList.remove('is-dragging');

                const files = event.dataTransfer.files;
                if (files.length === 0) return;

                // all .md files from the drop event
                const mdFiles = Array.from(files).filter(f => f.name.toLowerCase().endsWith('.md'));
                
                if (mdFiles.length === 0) {
                    showToast('Please drop at least one .md file.', true);
                    return;
                }

                for (const file of mdFiles) {
                    try {
                        const fileContent = await file.text();
                        if (!fileContent) {
                            showToast(`The file "${file.name}" is empty.`, true);
                            continue; 
                        }
                        renderContent(fileContent, file.name);
                    } catch (err) {
                        console.error(`Error reading file ${file.name}:`, err);
                        showToast(`Sorry, there was an error reading "${file.name}".`, true);
                    }
                }
            }

            appContainer.addEventListener('dragover', (event) => {
                event.preventDefault();
                if (event.dataTransfer.types.includes('Files')) {
                    appContainer.classList.add('is-dragging');
                }
            });

            appContainer.addEventListener('dragleave', () => {
                appContainer.classList.remove('is-dragging');
            });

            appContainer.addEventListener('drop', handleFileDrop);

            newTabBtn.addEventListener('click', createNewTab);
            document.addEventListener('paste', handlePaste);

            createNewTab();
        });
    </script>

</body>
</html>
